<svg width="1200" height="850" xmlns="http://www.w3.org/2000/svg" style="background-color: #f9f9f9;">
  <!-- Definitions for reusable styles -->
  <defs>
    <style type="text/css"><![CDATA[
      .box { fill: #ffffff; stroke: #333; stroke-width: 2; rx: 10; ry: 10; }
      .title { font-size: 16px; font-weight: bold; fill: #0056b3; }
      .label { font-size: 12px; fill: #555; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    ]]></style>
    <!-- Arrowhead marker definition -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- 1. Title Header -->
  <rect x="50" y="30" width="1100" height="40" fill="#e0f7fa" stroke="#00bcd4" stroke-width="2"/>
  <text x="100" y="65" class="title" font-size="22px">Microservices Architecture Diagram</text>
  <text x="100" y="85" class="label">Illustrating service interaction and data flow.</text>

  <!-- ================================================================= -->
  <!-- 2. Core Components (Services) -->
  <!-- ================================================================= -->

  <!-- Service 1: API Gateway -->
  <rect x="100" y="120" width="220" height="80" class="box"/>
  <text x="210" y="155" class="title">API Gateway</text>
  <text x="210" y="185" class="label">Request Routing, Auth, Rate Limiting</text>

  <!-- Service 2: User Service -->
  <rect x="400" y="120" width="220" height="80" class="box"/>
  <text x="510" y="155" class="title">User Service</text>
  <text x="510" y="185" class="label">User Profiles, Authentication</text>

  <!-- Service 3: Product Catalog Service -->
  <rect x="700" y="120" width="220" height="80" class="box"/>
  <text x="810" y="155" class="title">Product Catalog</text>
  <text x="810" y="185" class="label">Product Details, Inventory</text>

  <!-- Service 4: Order Service -->
  <rect x="100" y="250" width="220" height="80" class="box"/>
  <text x="210" y="285" class="title">Order Service</text>
  <text x="210" y="315" class="label">Order Placement, Status Tracking</text>

  <!-- Service 5: Payment Service -->
  <rect x="400" y="250" width="220" height="80" class="box"/>
  <text x="510" y="285" class="title">Payment Service</text>
  <text x="510" y="315" class="label">Payment Processing, Gateway Integration</text>

  <!-- Service 6: Notification Service -->
  <rect x="700" y="250" width="220" height="80" class="box"/>
  <text x="810" y="285" class="title">Notification Service</text>
  <text x="810" y="315" class="label">Email, SMS, Push Notifications</text>

  <!-- ================================================================= -->
  <!-- 3. Data Stores (Databases/Cache) -->
  <!-- ================================================================= -->

  <!-- DB 1: User DB -->
  <rect x="400" y="400" width="220" height="80" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="510" y="435" class="title" style="fill: #2e7d32;">User Database</text>
  <text x="510" y="465" class="label">PostgreSQL (User Data)</text>

  <!-- DB 2: Product Cache -->
  <rect x="700" y="400" width="220" height="80" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="810" y="435" class="title" style="fill: #1976d2;">Product Cache</text>
  <text x="810" y="465" class="label">Redis (Inventory/Details)</text>

  <!-- DB 3: Order DB -->
  <rect x="100" y="400" width="220" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="210" y="435" class="title" style="fill: #e65100;">Order Database</text>
  <text x="210" y="465" class="label">MongoDB (Order History)</text>

  <!-- ================================================================= -->
  <!-- 4. Data Flow Arrows (Connections) -->
  <!-- ================================================================= -->

  <!-- Flow 1: Client to Gateway -->
  <path d="M 100 160 Q 100 140, 100 120" class="arrow"/>
  <text x="80" y="140" class="label" style="fill: #333;">Client Request</text>

  <!-- Flow 2: Gateway to User Service -->
  <path d="M 320 160 Q 320 140, 400 140" class="arrow"/>
  <text x="360" y="145" class="label" style="fill: #333;">Auth Check</text>

  <!-- Flow 3: Gateway to Product Catalog -->
  <path d="M 320 160 Q 320 140, 700 140" class="arrow"/>
  <text x="510" y="145" class="label" style="fill: #333;">Fetch Product Info</text>

  <!-- Flow 4: Gateway to Order Service -->
  <path d="M 320 160 Q 320 140, 100 140" class="arrow"/>
  <text x="150" y="145" class="label" style="fill: #333;">Create Order</text>

  <!-- Flow 5: Order Service to User Service (Data Retrieval) -->
  <path d="M 320 210 Q 320 160, 400 160" class="arrow" style="stroke: #4caf50; stroke-width: 1.5;"/>
  <text x="360" y="170" class="label" style="fill: #4caf50;">Get User Details</text>

  <!-- Flow 6: Order Service to Payment Service -->
  <path d="M 320 210 Q 320 160, 500 160" class="arrow" style="stroke: #ff9800;"/>
  <text x="350" y="165" class="label" style="fill: #ff9800;">Payment Request</text>

  <!-- Flow 7: Payment Service to Payment Gateway (External) -->
  <path d="M 600 160 Q 700 160, 700 160" style="stroke: #ff9800; stroke-dasharray: 5 5;"/>
  <text x="650" y="165" class="label" style="fill: #ff9800;">External Gateway</text>

  <!-- Flow 8: Order Service to Order DB -->
  <path d="M 150 350 Q 150 350, 150 350" style="stroke: #3f51b5;"/>
  <text x="150" y="355" class="label" style="fill: #3f51b5;">Write Order Record</text>

  <!-- Flow 9: Product Service to Product DB -->
  <path d="M 600 350 Q 600 350, 600 350" style="stroke: #4caf50;"/>
  <text x="600" y="355" class="label" style="fill: #4caf50;">Check Inventory</text>

  <!-- Flow 10: User Interaction (Conceptual) -->
  <path d="M 50 50 Q 100 50, 100 50" style="stroke: #9e9e9e; stroke-dasharray: 5 5;"/>
  <text x="100" y="30" class="label" style="fill: #9e9e9e;">User Initiates Checkout</text>

</svg>