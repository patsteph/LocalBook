  <text x="906" y="362" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Mid complexity, standard integration</text>
  <text x="1286" y="362" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">High complexity, robust integration</text>
