  <rect x="120" y="586" width="1352" height="82" rx="6" fill="#FFFFFF" />
  <text x="136" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Customer Journey Orchestration</text>
  <text x="526" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Census: low complexity, advanced (reverse-ETL)</text>
  <text x="906" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Treasure Data: very high complexity, advanced features</text>
  <text x="1286" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle"></text>
  <rect x="120" y="676" width="1352" height="82" rx="6" fill="#F6F9FC" />
  <text x="136" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Advanced Analytics Support</text>
