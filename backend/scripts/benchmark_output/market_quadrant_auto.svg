  <text x="906" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Quick Wins: top-left, low complexity, strong basics</text>
  <text x="1286" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Niche Tools: bottom-left, specialized, lower adoption</text>
</svg>