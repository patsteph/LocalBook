  <text x="136" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Data Integration Capabilities</text>
  <text x="526" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Segment: low complexity, mid-depth features</text>
  <text x="906" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Rudderstack: mid complexity, mid-depth features</text>
