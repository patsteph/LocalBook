  <text x="906" y="270" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">Analytics</text>
  <rect x="1100" y="220" width="372" height="80" rx="8" fill="#635BFF" />
  <text x="1286" y="270" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">ML Training</text>
  <rect x="120" y="316" width="1352" height="82" rx="6" fill="#F6F9FC" />
