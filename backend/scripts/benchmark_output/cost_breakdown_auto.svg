<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
    <polygon points="0 0, 10 5, 0 10" fill="#425466" />
  </marker>
  <marker id="arrowhead_primary" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
    <polygon points="0 0, 10 5, 0 10" fill="#635BFF" />
  </marker>
  <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0A2540" flood-opacity="0.08" />
  </filter>
  <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#635BFF" stop-opacity="1" />
    <stop offset="100%" stop-color="#4A43D1" stop-opacity="1" />
  </linearGradient>
  <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#F6F9FC" stop-opacity="1" />
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="1" />
  </linearGradient>
</defs>
  <rect x="0" y="0" width="1600" height="900" fill="#FFFFFF" />
  <rect x="60" y="60" width="1480" height="100" rx="12" fill="url(#headerGradient)" />
  <text x="80" y="106" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#0A2540">AWS Cloud Cost Comparison by Product Line</text>
  <text x="80" y="138" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" fill="#425466">Fiscal Year 2026 Cost Breakdown and Cost-per-Customer Analysis for FinOps &amp; CFO Review</text>

  <rect x="340" y="220" width="372" height="80" rx="8" fill="#635BFF" />
  <text x="526" y="270" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">Platform</text>
