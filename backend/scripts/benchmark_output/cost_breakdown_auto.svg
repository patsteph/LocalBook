  <rect x="120" y="406" width="1352" height="82" rx="6" fill="#FFFFFF" />
  <text x="136" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Component Mix (compute, storage, data transfer, other)</text>
  <text x="526" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Platform: 62% compute, 23% storage, 10% data transfer, 5% other</text>
  <text x="906" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">Analytics: 35% compute, 48% storage, 12% data transfer, 5% other</text>
  <text x="1286" y="452" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">ML Training: 88% compute, 8% storage, 3% data transfer, 1% other</text>
  <rect x="120" y="496" width="1352" height="82" rx="6" fill="#F6F9FC" />
  <text x="136" y="542" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Reserved Instance Coverage (%)</text>
  <text x="526" y="542" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">78%</text>
  <text x="906" y="542" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">92%</text>
  <text x="1286" y="542" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">12%</text>
  <rect x="120" y="586" width="1352" height="82" rx="6" fill="#FFFFFF" />
  <text x="136" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Number of Customers</text>
  <text x="526" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">186</text>
  <text x="906" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle"></text>
  <text x="1286" y="632" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle"></text>
  <rect x="120" y="676" width="1352" height="82" rx="6" fill="#F6F9FC" />
  <text x="136" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A2540">Cost-per-Customer (USD)</text>
  <text x="526" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">$2,280</text>
  <text x="906" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">$980</text>
  <text x="1286" y="722" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="14" fill="#425466" text-anchor="middle">$14,500</text>
